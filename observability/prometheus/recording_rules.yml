# Prometheus recording rules for the service2mcp platform.
#
# Pre-compute expensive queries so dashboards and alerts are fast and
# consistent.  All recorded metrics use the `service2mcp:` namespace.

groups:
  - name: service2mcp.recording_rules
    interval: 30s
    rules:
      # Per-operation tool-call rate over 5 minutes.
      - record: service2mcp:tool_call_rate:5m
        expr: >-
          sum by (operation_id) (
            rate(mcp_runtime_tool_calls_total[5m])
          )

      # Per-operation error rate over 5 minutes.
      - record: service2mcp:error_rate:5m
        expr: >-
          sum by (operation_id) (
            rate(mcp_runtime_tool_calls_total{outcome="error"}[5m])
          )
          /
          sum by (operation_id) (
            rate(mcp_runtime_tool_calls_total[5m])
          )

      # 95th-percentile compilation stage duration.
      - record: service2mcp:compilation_duration:p95
        expr: >-
          histogram_quantile(0.95,
            sum by (le) (
              rate(compiler_workflow_stage_duration_seconds_bucket[5m])
            )
          )

      # Count of currently open circuit breakers.
      - record: service2mcp:active_circuit_breakers
        expr: >-
          sum(mcp_runtime_circuit_breaker_state == 1) or vector(0)
