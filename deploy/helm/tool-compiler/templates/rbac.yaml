apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tool-compiler.fullname" . }}-compiler-worker
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "compiler-worker") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "tool-compiler.fullname" . }}-compiler-worker-deployer
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "compiler-worker") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "services"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tool-compiler.fullname" . }}-compiler-worker-deployer
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "compiler-worker") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "tool-compiler.fullname" . }}-compiler-worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "tool-compiler.fullname" . }}-compiler-worker-deployer
