apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "tool-compiler.fullname" . }}-migrations
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "migrations") | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "migrations") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrations
          image: "{{ default .Values.images.compilerApi.repository .Values.images.migrations.repository }}:{{ default .Values.images.compilerApi.tag .Values.images.migrations.tag }}"
          imagePullPolicy: {{ default .Values.images.compilerApi.pullPolicy .Values.images.migrations.pullPolicy }}
          command:
            - sh
            - -lc
            - alembic -c migrations/alembic.ini upgrade head
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.global.database.user }}:{{ .Values.global.database.password }}@{{ include "tool-compiler.fullname" . }}-postgres:{{ .Values.global.database.port }}/{{ .Values.global.database.name }}"
