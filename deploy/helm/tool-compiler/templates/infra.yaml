  name: {{ include "tool-compiler.fullname" . }}-temporal
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "temporal") | nindent 4 }}
spec:
  selector:
    {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "temporal") | nindent 4 }}
  ports:
    - name: grpc
      port: 7233
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tool-compiler.fullname" . }}-temporal
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "temporal") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "temporal") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "temporal") | nindent 8 }}
    spec:
      containers:
        - name: temporal
          image: "{{ .Values.images.temporal.repository }}:{{ .Values.images.temporal.tag }}"
          imagePullPolicy: {{ .Values.images.temporal.pullPolicy }}
          command: ["temporal", "server", "start-dev", "--ip", "0.0.0.0"]
          ports:
            - name: grpc
              containerPort: 7233
          startupProbe:
            tcpSocket:
              port: grpc
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: grpc
          livenessProbe:
            tcpSocket:
              port: grpc
