apiVersion: v1
kind: Service
metadata:
  name: {{ include "tool-compiler.fullname" . }}-postgres
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  selector:
    {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tool-compiler.fullname" . }}-postgres
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}"
          imagePullPolicy: {{ .Values.images.postgres.pullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.global.database.name | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.global.database.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tool-compiler.fullname" . }}-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          startupProbe:
            tcpSocket:
              port: postgres
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: postgres
          livenessProbe:
            tcpSocket:
              port: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
---
