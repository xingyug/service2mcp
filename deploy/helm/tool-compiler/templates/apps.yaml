apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tool-compiler.fullname" . }}-runtime-ir
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "mcp-runtime") | nindent 4 }}
data:
  service-ir.json: |
{{ .Values.mcpRuntime.serviceIrJson | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tool-compiler.fullname" . }}-compiler-api
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "compiler-api") | nindent 4 }}
spec:
  selector:
    {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "compiler-api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.services.compilerApi.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tool-compiler.fullname" . }}-compiler-api
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "compiler-api") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "compiler-api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "compiler-api") | nindent 8 }}
    spec:
      containers:
        - name: compiler-api
          image: "{{ .Values.images.compilerApi.repository }}:{{ .Values.images.compilerApi.tag }}"
          imagePullPolicy: {{ .Values.images.compilerApi.pullPolicy }}
          command:
            - sh
            - -lc
            - alembic -c migrations/alembic.ini upgrade head && python -m uvicorn apps.compiler_api.main:app --host 0.0.0.0 --port {{ .Values.services.compilerApi.port }}
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.global.database.user }}:{{ .Values.global.database.password }}@{{ include "tool-compiler.fullname" . }}-postgres:{{ .Values.global.database.port }}/{{ .Values.global.database.name }}"
            - name: WORKFLOW_ENGINE
              value: celery
            - name: REDIS_URL
              value: {{ .Values.global.redisUrl | quote }}
            - name: TEMPORAL_ADDRESS
              value: {{ .Values.global.temporalAddress | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.services.compilerApi.port }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tool-compiler.fullname" . }}-access-control
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "access-control") | nindent 4 }}
spec:
  selector:
    {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "access-control") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.services.accessControl.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tool-compiler.fullname" . }}-access-control
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "access-control") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "access-control") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "access-control") | nindent 8 }}
    spec:
      containers:
        - name: access-control
          image: "{{ .Values.images.accessControl.repository }}:{{ .Values.images.accessControl.tag }}"
          imagePullPolicy: {{ .Values.images.accessControl.pullPolicy }}
          command:
            - sh
            - -lc
            - python -m uvicorn apps.access_control.main:app --host 0.0.0.0 --port {{ .Values.services.accessControl.port }}
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.global.database.user }}:{{ .Values.global.database.password }}@{{ include "tool-compiler.fullname" . }}-postgres:{{ .Values.global.database.port }}/{{ .Values.global.database.name }}"
            - name: ACCESS_CONTROL_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "tool-compiler.fullname" . }}-secrets
                  key: jwt-secret
            {{- if .Values.gatewayAdminMock.enabled }}
            - name: GATEWAY_ADMIN_URL
              value: "http://{{ include "tool-compiler.fullname" . }}-gateway-admin-mock:{{ .Values.services.gatewayAdminMock.port }}"
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.services.accessControl.port }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
{{- if .Values.gatewayAdminMock.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tool-compiler.fullname" . }}-gateway-admin-mock
  labels:
