      labels:
        {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "gateway-admin-mock") | nindent 8 }}
    spec:
      containers:
        - name: gateway-admin-mock
          image: "{{ .Values.images.accessControl.repository }}:{{ .Values.images.accessControl.tag }}"
          imagePullPolicy: {{ .Values.images.accessControl.pullPolicy }}
          command:
            - sh
            - -lc
            - python -m uvicorn apps.gateway_admin_mock.main:app --host 0.0.0.0 --port {{ .Values.services.gatewayAdminMock.port }}
          ports:
            - name: http
