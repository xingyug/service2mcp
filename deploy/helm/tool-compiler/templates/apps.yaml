{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tool-compiler.fullname" . }}-compiler-worker
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "compiler-worker") | nindent 4 }}
spec:
  selector:
    {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "compiler-worker") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.services.compilerWorker.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tool-compiler.fullname" . }}-compiler-worker
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "compiler-worker") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "compiler-worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "compiler-worker") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tool-compiler.fullname" . }}-compiler-worker
      containers:
        - name: compiler-worker
          image: "{{ .Values.images.compilerWorker.repository }}:{{ .Values.images.compilerWorker.tag }}"
          imagePullPolicy: {{ .Values.images.compilerWorker.pullPolicy }}
          command:
            - sh
            - -lc
            - python -m apps.compiler_worker.entrypoint
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.global.database.user }}:{{ .Values.global.database.password }}@{{ include "tool-compiler.fullname" . }}-postgres:{{ .Values.global.database.port }}/{{ .Values.global.database.name }}"
            - name: REDIS_URL
              value: {{ .Values.global.redisUrl | quote }}
            - name: TEMPORAL_ADDRESS
              value: {{ .Values.global.temporalAddress | quote }}
            - name: WORKFLOW_ENGINE
              value: celery
            - name: MCP_RUNTIME_IMAGE
              value: "{{ .Values.images.mcpRuntime.repository }}:{{ .Values.images.mcpRuntime.tag }}"
            - name: COMPILER_TARGET_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: CELERY_WORKER_CONCURRENCY
              value: "1"
            - name: CELERY_WORKER_POOL
              value: solo
            - name: ROUTE_PUBLISH_MODE
              value: access-control
            - name: ACCESS_CONTROL_URL
              value: "http://{{ include "tool-compiler.fullname" . }}-access-control:{{ .Values.services.accessControl.port }}"
            {{- range .Values.compilerWorker.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- range .Values.compilerWorker.secretEnv }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.services.compilerWorker.port }}
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
{{- if .Values.mcpRuntime.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tool-compiler.fullname" . }}-mcp-runtime
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "mcp-runtime") | nindent 4 }}
spec:
  selector:
    {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "mcp-runtime") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.services.mcpRuntime.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tool-compiler.fullname" . }}-mcp-runtime
  labels:
    {{- include "tool-compiler.componentLabels" (dict "root" . "component" "mcp-runtime") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "mcp-runtime") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tool-compiler.componentSelectorLabels" (dict "root" . "component" "mcp-runtime") | nindent 8 }}
    spec:
      containers:
        - name: mcp-runtime
          image: "{{ .Values.images.mcpRuntime.repository }}:{{ .Values.images.mcpRuntime.tag }}"
          imagePullPolicy: {{ .Values.images.mcpRuntime.pullPolicy }}
          command:
            - sh
            - -lc
            - python -m uvicorn apps.mcp_runtime.main:app --host 0.0.0.0 --port {{ .Values.services.mcpRuntime.port }}
          env:
            - name: SERVICE_IR_PATH
              value: /config/service-ir.json
            - name: BILLING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "tool-compiler.fullname" . }}-secrets
                  key: billing-secret
          ports:
            - name: http
              containerPort: {{ .Values.services.mcpRuntime.port }}
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: runtime-ir
              mountPath: /config
              readOnly: true
      volumes:
        - name: runtime-ir
          configMap:
            name: {{ include "tool-compiler.fullname" . }}-runtime-ir
{{- end }}
