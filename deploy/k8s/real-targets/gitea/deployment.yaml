apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: tc-real-targets
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: tool-compiler
    tool-compiler.io/protocol: openapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea
        app.kubernetes.io/part-of: tool-compiler
        tool-compiler.io/protocol: openapi
    spec:
      initContainers:
        - name: init-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /data/gitea/conf
              cp /config/app.ini /data/gitea/conf/app.ini
          volumeMounts:
            - name: gitea-data
              mountPath: /data
            - name: gitea-config
              mountPath: /config
      containers:
        - name: gitea
          image: gitea/gitea:1.22
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          volumeMounts:
            - name: gitea-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            failureThreshold: 60
            periodSeconds: 5
      volumes:
        - name: gitea-data
          emptyDir: {}
        - name: gitea-config
          configMap:
            name: gitea-config
