apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: example-targets
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: tool-compiler
    tool-compiler.io/protocol: openapi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea
        app.kubernetes.io/part-of: tool-compiler
        tool-compiler.io/protocol: openapi
    spec:
      initContainers:
      - name: init-config
        image: busybox:1.36
        command:
        - sh
        - -c
        - 'mkdir -p /data/gitea/conf

          cp /config/app.ini /data/gitea/conf/app.ini

          '
        volumeMounts:
        - name: gitea-data
          mountPath: /data
        - name: gitea-config
          mountPath: /config
      containers:
      - name: gitea
        image: gitea/gitea:1.22
        ports:
        - containerPort: 3000
          protocol: TCP
        env:
        - name: GITEA__security__INSTALL_LOCK
          value: 'true'
        - name: USER_UID
          value: '1000'
        - name: USER_GID
          value: '1000'
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: '1'
            memory: 1Gi
        volumeMounts:
        - name: gitea-data
          mountPath: /data
        readinessProbe:
          httpGet:
            path: /api/v1/version
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 15
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 6
        startupProbe:
          tcpSocket:
            port: 3000
          failureThreshold: 120
          periodSeconds: 5
      volumes:
      - name: gitea-data
        emptyDir: {}
      - name: gitea-config
        configMap:
          name: gitea-config
      nodeSelector:
        kubernetes.io/hostname: YOUR_NODE_HOSTNAME
