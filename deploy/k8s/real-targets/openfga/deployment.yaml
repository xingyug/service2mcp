apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfga
  namespace: tc-real-targets
  labels:
    app.kubernetes.io/name: openfga
    app.kubernetes.io/part-of: tool-compiler
    tool-compiler.io/protocol: grpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openfga
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openfga
        app.kubernetes.io/part-of: tool-compiler
        tool-compiler.io/protocol: grpc
    spec:
      containers:
        - name: openfga
          image: openfga/openfga:v1.8.2
          args: ["run"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 8081
              protocol: TCP
            - name: playground
              containerPort: 3000
              protocol: TCP
          env:
            - name: OPENFGA_DATASTORE_ENGINE
              value: memory
            - name: OPENFGA_PLAYGROUND_ENABLED
              value: "true"
            - name: OPENFGA_LOG_FORMAT
              value: json
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: model
              mountPath: /config
      volumes:
        - name: model
          configMap:
            name: openfga-config
