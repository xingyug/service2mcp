apiVersion: v1
kind: Service
metadata:
  name: openfga
  namespace: tc-real-targets
  labels:
    app.kubernetes.io/name: openfga
    app.kubernetes.io/part-of: tool-compiler
    tool-compiler.io/protocol: grpc
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: openfga
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 8081
      targetPort: 8081
      protocol: TCP
    - name: playground
      port: 3000
      targetPort: 3000
      protocol: TCP
