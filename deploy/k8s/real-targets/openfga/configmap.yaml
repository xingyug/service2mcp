apiVersion: v1
kind: ConfigMap
metadata:
  name: openfga-config
  namespace: example-targets
  labels:
    app.kubernetes.io/name: openfga
    app.kubernetes.io/part-of: tool-compiler
data:
  model.json: |
    {
      "schema_version": "1.1",
      "type_definitions": [
        {
          "type": "user"
        },
        {
          "type": "organization",
          "relations": {
            "owner": { "this": {} },
            "admin": { "this": {} },
            "member": {
              "union": {
                "child": [
                  { "this": {} },
                  { "computedUserset": { "relation": "admin" } },
                  { "computedUserset": { "relation": "owner" } }
                ]
              }
            }
          },
          "metadata": {
            "relations": {
              "owner":  { "directly_related_user_types": [{ "type": "user" }] },
              "admin":  { "directly_related_user_types": [{ "type": "user" }] },
              "member": { "directly_related_user_types": [{ "type": "user" }] }
            }
          }
        },
        {
          "type": "document",
          "relations": {
            "owner": { "this": {} },
            "editor": {
              "union": {
                "child": [
                  { "this": {} },
                  { "computedUserset": { "relation": "owner" } }
                ]
              }
            },
            "viewer": {
              "union": {
                "child": [
                  { "this": {} },
                  { "computedUserset": { "relation": "editor" } },
                  { "tupleToUserset": {
                      "tupleset": { "relation": "parent_folder" },
                      "computedUserset": { "relation": "viewer" }
                    }
                  }
                ]
              }
            },
            "parent_folder": { "this": {} },
            "commenter": {
              "union": {
                "child": [
                  { "this": {} },
                  { "computedUserset": { "relation": "editor" } }
                ]
              }
            }
          },
          "metadata": {
            "relations": {
              "owner":         { "directly_related_user_types": [{ "type": "user" }] },
              "editor":        { "directly_related_user_types": [{ "type": "user" }] },
              "viewer":        { "directly_related_user_types": [{ "type": "user" }, { "type": "organization", "relation": "member" }] },
              "parent_folder": { "directly_related_user_types": [{ "type": "folder" }] },
              "commenter":     { "directly_related_user_types": [{ "type": "user" }] }
            }
          }
        },
        {
          "type": "folder",
          "relations": {
            "owner": { "this": {} },
            "editor": {
              "union": {
                "child": [
                  { "this": {} },
                  { "computedUserset": { "relation": "owner" } }
                ]
              }
            },
            "viewer": {
              "union": {
                "child": [
                  { "this": {} },
                  { "computedUserset": { "relation": "editor" } }
                ]
              }
            }
          },
          "metadata": {
            "relations": {
              "owner":  { "directly_related_user_types": [{ "type": "user" }] },
              "editor": { "directly_related_user_types": [{ "type": "user" }] },
              "viewer": { "directly_related_user_types": [{ "type": "user" }, { "type": "organization", "relation": "member" }] }
            }
          }
        }
      ]
    }
