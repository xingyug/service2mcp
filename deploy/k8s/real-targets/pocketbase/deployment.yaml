apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocketbase
  namespace: tc-real-targets
  labels:
    app.kubernetes.io/name: pocketbase
    app.kubernetes.io/part-of: tool-compiler
    tool-compiler.io/protocol: rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pocketbase
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pocketbase
        app.kubernetes.io/part-of: tool-compiler
        tool-compiler.io/protocol: rest
    spec:
      containers:
        - name: pocketbase
          image: us-central1-docker.pkg.dev/insightcompass-465300/tool-compiler/real-target-pocketbase:latest
          ports:
            - containerPort: 8090
              protocol: TCP
          resources:
            requests:
              cpu: 30m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
