apiVersion: apps/v1
kind: Deployment
metadata:
  name: directus
  namespace: tc-real-targets
  labels:
    app.kubernetes.io/name: directus
    app.kubernetes.io/part-of: tool-compiler
    tool-compiler.io/protocol: graphql
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: directus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: directus
        app.kubernetes.io/part-of: tool-compiler
        tool-compiler.io/protocol: graphql
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z real-postgres 5432; do echo "waiting for postgres..."; sleep 2; done']
      containers:
        - name: directus
          image: directus/directus:11.4.1
          ports:
            - containerPort: 8055
              protocol: TCP
          env:
            - name: DB_CLIENT
              value: pg
            - name: DB_HOST
              value: real-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: directus
            - name: DB_USER
              value: directus_user
            - name: DB_PASSWORD
              value: directus_pass
            - name: ADMIN_EMAIL
              value: admin@example.com
            - name: ADMIN_PASSWORD
              value: Admin123!
            - name: KEY
              value: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            - name: SECRET
              value: "0987654321-abcdef-ghij-klmn-opqrstuvwxyz"
            - name: PUBLIC_URL
              value: "http://directus.tc-real-targets.svc.cluster.local:8055"
            - name: WEBSOCKETS_ENABLED
              value: "true"
            - name: CORS_ENABLED
              value: "true"
            - name: CORS_ORIGIN
              value: "*"
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /server/health
              port: 8055
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /server/health
              port: 8055
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /server/health
              port: 8055
            failureThreshold: 60
            periodSeconds: 5
