apiVersion: apps/v1
kind: Deployment
metadata:
  name: northbreeze
  namespace: example-targets
  labels:
    app.kubernetes.io/name: northbreeze
    app.kubernetes.io/part-of: tool-compiler
    tool-compiler.io/protocol: odata
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: northbreeze
  template:
    metadata:
      labels:
        app.kubernetes.io/name: northbreeze
        app.kubernetes.io/part-of: tool-compiler
        tool-compiler.io/protocol: odata
    spec:
      containers:
      - name: northbreeze
        image: YOUR_REGISTRY/YOUR_PROJECT/real-target-northbreeze:arm64-k3s
        ports:
        - containerPort: 4004
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 300m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 4004
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 4004
          initialDelaySeconds: 10
          periodSeconds: 30
      nodeSelector:
        kubernetes.io/hostname: YOUR_NODE_HOSTNAME
      imagePullSecrets:
      - name: gcr-secret
