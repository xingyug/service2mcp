apiVersion: apps/v1
kind: Deployment
metadata:
  name: northbreeze
  namespace: tc-real-targets
  labels:
    app.kubernetes.io/name: northbreeze
    app.kubernetes.io/part-of: tool-compiler
    tool-compiler.io/protocol: odata
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: northbreeze
  template:
    metadata:
      labels:
        app.kubernetes.io/name: northbreeze
        app.kubernetes.io/part-of: tool-compiler
        tool-compiler.io/protocol: odata
    spec:
      containers:
        - name: northbreeze
          image: us-central1-docker.pkg.dev/insightcompass-465300/tool-compiler/real-target-northbreeze:latest
          ports:
            - containerPort: 4004
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4004
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4004
            initialDelaySeconds: 10
            periodSeconds: 30
