apiVersion: apps/v1
kind: Deployment
metadata:
  name: soap-cxf
  namespace: example-targets
  labels:
    app.kubernetes.io/name: soap-cxf
    app.kubernetes.io/part-of: tool-compiler
    tool-compiler.io/protocol: soap
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: soap-cxf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: soap-cxf
        app.kubernetes.io/part-of: tool-compiler
        tool-compiler.io/protocol: soap
    spec:
      containers:
      - name: soap-cxf
        image: YOUR_REGISTRY/YOUR_PROJECT/real-target-soap-cxf:arm64-k3s
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: JAVA_OPTS
          value: -Xmx384m -Xms128m
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 768Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          failureThreshold: 60
          periodSeconds: 5
      nodeSelector:
        kubernetes.io/hostname: YOUR_NODE_HOSTNAME
      imagePullSecrets:
      - name: gcr-secret
