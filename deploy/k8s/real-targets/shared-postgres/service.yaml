apiVersion: v1
kind: Service
metadata:
  name: real-postgres
  namespace: tc-real-targets
  labels:
    app.kubernetes.io/name: real-postgres
    app.kubernetes.io/part-of: tool-compiler
    tool-compiler.io/protocol: sql
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: real-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
