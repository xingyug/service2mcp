apiVersion: v1
kind: ConfigMap
metadata:
  name: real-postgres-init
  namespace: example-targets
  labels:
    app.kubernetes.io/name: real-postgres
    app.kubernetes.io/part-of: tool-compiler
data:
  01-databases.sql: |
    -- Create databases for Directus, Jackson, and SQL protocol testing
    CREATE DATABASE directus;
    CREATE USER directus_user WITH PASSWORD 'directus_pass';
    GRANT ALL PRIVILEGES ON DATABASE directus TO directus_user;
    ALTER DATABASE directus OWNER TO directus_user;

    CREATE DATABASE jackson;
    CREATE USER jackson_user WITH PASSWORD 'jackson_pass';
    GRANT ALL PRIVILEGES ON DATABASE jackson TO jackson_user;
    ALTER DATABASE jackson OWNER TO jackson_user;

    -- Catalog v2 is the rich SQL test target
    CREATE DATABASE catalog_v2;
    CREATE USER catalog WITH PASSWORD 'catalog';
    GRANT ALL PRIVILEGES ON DATABASE catalog_v2 TO catalog;
    ALTER DATABASE catalog_v2 OWNER TO catalog;

  02-catalog-schema.sql: |
    -- Rich enterprise schema for SQL protocol testing
    -- Connect to catalog_v2 database
    \c catalog_v2

    -- Grant schema privileges
    GRANT ALL ON SCHEMA public TO catalog;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO catalog;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO catalog;

    -- Lookup / dimension tables
    CREATE TABLE regions (
        id          SERIAL PRIMARY KEY,
        name        TEXT NOT NULL UNIQUE,
        timezone    TEXT NOT NULL DEFAULT 'UTC'
    );

    CREATE TABLE categories (
        id          SERIAL PRIMARY KEY,
        name        TEXT NOT NULL UNIQUE,
        slug        TEXT NOT NULL UNIQUE,
        description TEXT,
        parent_id   INTEGER REFERENCES categories(id),
        created_at  TIMESTAMPTZ DEFAULT now()
    );

    CREATE TABLE tags (
        id   SERIAL PRIMARY KEY,
        name TEXT NOT NULL UNIQUE
    );

    -- Core business tables
    CREATE TABLE customers (
        id              BIGSERIAL PRIMARY KEY,
        email           TEXT NOT NULL UNIQUE,
        full_name       TEXT NOT NULL,
        tier            TEXT NOT NULL DEFAULT 'standard' CHECK (tier IN ('standard','gold','platinum','enterprise')),
        region_id       INTEGER REFERENCES regions(id),
        phone           TEXT,
        metadata        JSONB DEFAULT '{}',
        active          BOOLEAN DEFAULT true,
        created_at      TIMESTAMPTZ DEFAULT now(),
        updated_at      TIMESTAMPTZ DEFAULT now()
    );

    CREATE TABLE products (
        id              BIGSERIAL PRIMARY KEY,
        sku             TEXT NOT NULL UNIQUE,
        name            TEXT NOT NULL,
        description     TEXT,
        price_cents     INTEGER NOT NULL CHECK (price_cents >= 0),
        currency        TEXT NOT NULL DEFAULT 'USD',
        category_id     INTEGER REFERENCES categories(id),
        stock_quantity  INTEGER NOT NULL DEFAULT 0,
        weight_grams    INTEGER,
        is_active       BOOLEAN DEFAULT true,
        attributes      JSONB DEFAULT '{}',
        created_at      TIMESTAMPTZ DEFAULT now(),
        updated_at      TIMESTAMPTZ DEFAULT now()
    );

    CREATE TABLE product_tags (
        product_id BIGINT REFERENCES products(id) ON DELETE CASCADE,
        tag_id     INTEGER REFERENCES tags(id) ON DELETE CASCADE,
        PRIMARY KEY (product_id, tag_id)
    );

    CREATE TYPE order_status AS ENUM ('pending','confirmed','processing','shipped','delivered','cancelled','refunded');

    CREATE TABLE orders (
        id              BIGSERIAL PRIMARY KEY,
        order_number    TEXT NOT NULL UNIQUE,
        customer_id     BIGINT NOT NULL REFERENCES customers(id),
        status          order_status NOT NULL DEFAULT 'pending',
        total_cents     INTEGER NOT NULL DEFAULT 0,
        currency        TEXT NOT NULL DEFAULT 'USD',
        shipping_address JSONB,
        notes           TEXT,
        placed_at       TIMESTAMPTZ DEFAULT now(),
        shipped_at      TIMESTAMPTZ,
        delivered_at    TIMESTAMPTZ,
        created_at      TIMESTAMPTZ DEFAULT now(),
        updated_at      TIMESTAMPTZ DEFAULT now()
    );

    CREATE TABLE order_items (
        id          BIGSERIAL PRIMARY KEY,
        order_id    BIGINT NOT NULL REFERENCES orders(id) ON DELETE CASCADE,
        product_id  BIGINT NOT NULL REFERENCES products(id),
        quantity    INTEGER NOT NULL CHECK (quantity > 0),
        unit_price_cents INTEGER NOT NULL,
        UNIQUE (order_id, product_id)
    );

    CREATE TABLE reviews (
        id          BIGSERIAL PRIMARY KEY,
        product_id  BIGINT NOT NULL REFERENCES products(id) ON DELETE CASCADE,
        customer_id BIGINT NOT NULL REFERENCES customers(id),
        rating      SMALLINT NOT NULL CHECK (rating BETWEEN 1 AND 5),
        title       TEXT,
        body        TEXT,
        verified    BOOLEAN DEFAULT false,
        created_at  TIMESTAMPTZ DEFAULT now(),
        UNIQUE (product_id, customer_id)
    );

    CREATE TABLE inventory_log (
        id          BIGSERIAL PRIMARY KEY,
        product_id  BIGINT NOT NULL REFERENCES products(id),
        delta       INTEGER NOT NULL,
        reason      TEXT NOT NULL,
        performed_by TEXT,
        created_at  TIMESTAMPTZ DEFAULT now()
    );

    -- Indexes
    CREATE INDEX idx_customers_email ON customers(email);
    CREATE INDEX idx_customers_tier ON customers(tier);
    CREATE INDEX idx_products_category ON products(category_id);
    CREATE INDEX idx_products_sku ON products(sku);
    CREATE INDEX idx_orders_customer ON orders(customer_id);
    CREATE INDEX idx_orders_status ON orders(status);
    CREATE INDEX idx_order_items_order ON order_items(order_id);
    CREATE INDEX idx_reviews_product ON reviews(product_id);

    -- Views
    CREATE VIEW order_summaries AS
    SELECT
        o.id AS order_id,
        o.order_number,
        c.email AS customer_email,
        c.full_name AS customer_name,
        c.tier AS customer_tier,
        o.status,
        o.total_cents,
        o.currency,
        o.placed_at,
        COUNT(oi.id) AS item_count
    FROM orders o
    JOIN customers c ON c.id = o.customer_id
    LEFT JOIN order_items oi ON oi.order_id = o.id
    GROUP BY o.id, o.order_number, c.email, c.full_name, c.tier, o.status, o.total_cents, o.currency, o.placed_at;

    CREATE VIEW product_catalog AS
    SELECT
        p.id,
        p.sku,
        p.name,
        p.description,
        p.price_cents,
        p.currency,
        p.stock_quantity,
        p.is_active,
        cat.name AS category_name,
        cat.slug AS category_slug,
        COALESCE(AVG(r.rating), 0) AS avg_rating,
        COUNT(DISTINCT r.id) AS review_count
    FROM products p
    LEFT JOIN categories cat ON cat.id = p.category_id
    LEFT JOIN reviews r ON r.product_id = p.id
    GROUP BY p.id, p.sku, p.name, p.description, p.price_cents, p.currency, p.stock_quantity, p.is_active, cat.name, cat.slug;

    -- Functions
    CREATE OR REPLACE FUNCTION get_customer_order_total(p_customer_id BIGINT)
    RETURNS TABLE(total_orders BIGINT, total_spent_cents BIGINT) AS $$
    BEGIN
        RETURN QUERY
        SELECT COUNT(*)::BIGINT, COALESCE(SUM(total_cents), 0)::BIGINT
        FROM orders
        WHERE customer_id = p_customer_id AND status NOT IN ('cancelled', 'refunded');
    END;
    $$ LANGUAGE plpgsql;

