apiVersion: apps/v1
kind: Deployment
metadata:
  name: openapi-petstore
  namespace: example-test-targets
  labels:
    app: openapi-petstore
    app.kubernetes.io/name: openapi-petstore
    app.kubernetes.io/part-of: example-test-targets
    app.kubernetes.io/component: test-target
    tool-compiler.io/protocol: openapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openapi-petstore
  template:
    metadata:
      labels:
        app: openapi-petstore
        app.kubernetes.io/name: openapi-petstore
        app.kubernetes.io/component: test-target
        tool-compiler.io/protocol: openapi
    spec:
      containers:
        - name: petstore
          image: swaggerapi/petstore3:unstable
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v3/openapi.json
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v3/openapi.json
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /api/v3/openapi.json
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
