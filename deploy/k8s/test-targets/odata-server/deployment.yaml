apiVersion: apps/v1
kind: Deployment
metadata:
  name: odata-server
  namespace: tool-compiler-test-targets
  labels:
    app: odata-server
    app.kubernetes.io/name: odata-server
    app.kubernetes.io/part-of: tool-compiler-test-targets
    app.kubernetes.io/component: test-target
    tool-compiler.io/protocol: odata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odata-server
  template:
    metadata:
      labels:
        app: odata-server
        app.kubernetes.io/name: odata-server
        app.kubernetes.io/component: test-target
        tool-compiler.io/protocol: odata
    spec:
      containers:
        - name: odata-server
          image: us-central1-docker.pkg.dev/insightcompass-465300/tool-compiler/test-target-odata:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
