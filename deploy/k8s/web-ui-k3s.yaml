apiVersion: apps/v1
kind: Deployment
metadata:
  name: service2mcp-web-ui
  labels:
    app.kubernetes.io/name: service2mcp
    app.kubernetes.io/component: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: web-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web-ui
    spec:
      nodeSelector:
        kubernetes.io/hostname: YOUR_NODE_HOSTNAME
      imagePullSecrets:
        - name: gcr-secret
      containers:
        - name: web-ui
          image: YOUR_REGISTRY/YOUR_PROJECT/web-ui:arm64-webui-e8c9358
          imagePullPolicy: Always
          env:
            - name: COMPILER_API_INTERNAL_URL
              value: "http://service2mcp-compiler-api:8000"
            - name: ACCESS_CONTROL_INTERNAL_URL
              value: "http://service2mcp-access-control:8001"
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 192Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: service2mcp-web-ui
  labels:
    app.kubernetes.io/name: service2mcp
    app.kubernetes.io/component: web-ui
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: web-ui
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30080
