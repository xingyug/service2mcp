name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Validate local dev compose
        run: docker compose -f deploy/docker-compose.yaml config

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy libs apps tests/contract tests/integration tests/e2e

      - name: Unit and contract tests with coverage
        run: pytest -q libs tests/contract --cov=apps --cov=libs --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  integration:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Integration and end-to-end tests
        run: pytest -q tests/integration tests/e2e

  build-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build compiler-api image
        run: |
          docker build \
            --build-arg APP_MODULE=apps.compiler_api.main:app \
            --build-arg APP_PORT=8000 \
            -t tool-compiler/compiler-api:${GITHUB_SHA} \
            -f deploy/docker/Dockerfile.app .

      - name: Build access-control image
        run: |
          docker build \
            --build-arg APP_MODULE=apps.access_control.main:app \
            --build-arg APP_PORT=8001 \
            -t tool-compiler/access-control:${GITHUB_SHA} \
            -f deploy/docker/Dockerfile.app .

      - name: Build compiler-worker image
        run: |
          docker build \
            --build-arg APP_MODULE=apps.compiler_worker.main:app \
            --build-arg APP_PORT=8002 \
            -t tool-compiler/compiler-worker:${GITHUB_SHA} \
            -f deploy/docker/Dockerfile.app .

      - name: Build mcp-runtime image
        run: |
          docker build \
            --build-arg APP_MODULE=apps.mcp_runtime.main:app \
            --build-arg APP_PORT=8003 \
            -t tool-compiler/mcp-runtime:${GITHUB_SHA} \
            -f deploy/docker/Dockerfile.app .
