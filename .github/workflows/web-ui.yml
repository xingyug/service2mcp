name: Web UI CI

on:
  push:
    branches: [main, feat/web-ui]
    paths:
      - 'apps/web-ui/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web-ui/**'

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/web-ui

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web-ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
